# TokenHelm bundled pricing (T019).
#
# Rates are USD per 1,000,000 tokens. These are sensible defaults only — override or extend
# them per-deployment via YamlPricingProvider(path=...) or a dict override; user entries win
# by (provider, model) key. Local models (Ollama) are zero-cost by default.
#
# Schema:
#   <provider>:
#     <model-id>: { input: <per-1M>, output: <per-1M> }

openai:
  gpt-4o: { input: 2.5, output: 10.0 }
  gpt-4o-mini: { input: 0.15, output: 0.6 }
  gpt-4-turbo: { input: 10.0, output: 30.0 }
  gpt-4.1: { input: 2.0, output: 8.0 }
  gpt-4.1-mini: { input: 0.4, output: 1.6 }
  o3: { input: 2.0, output: 8.0 }
  o4-mini: { input: 1.1, output: 4.4 }

anthropic:
  claude-opus-4-8: { input: 5.0, output: 25.0 }
  claude-opus-4-7: { input: 5.0, output: 25.0 }
  claude-opus-4-6: { input: 5.0, output: 25.0 }
  claude-sonnet-4-6: { input: 3.0, output: 15.0 }
  claude-haiku-4-5: { input: 1.0, output: 5.0 }
  claude-fable-5: { input: 10.0, output: 50.0 }

gemini:
  gemini-2.5-pro: { input: 1.25, output: 10.0 }
  gemini-2.5-flash: { input: 0.3, output: 2.5 }
  gemini-2.0-flash: { input: 0.1, output: 0.4 }

ollama:
  # Local inference — no per-token cost. Listed models resolve to zero rates; any unlisted
  # Ollama model is simply "unpriced" (cost 0, priced=False), which is also fine.
  llama3.3: { input: 0.0, output: 0.0 }
  llama3.1: { input: 0.0, output: 0.0 }
  qwen2.5: { input: 0.0, output: 0.0 }
  mistral: { input: 0.0, output: 0.0 }
