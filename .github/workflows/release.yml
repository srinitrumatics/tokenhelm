name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.classify.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Classify tag
        id: classify
        shell: bash
        run: |
          # Final release tags look like v1.2.3. Anything else (v1.2.3rc1, v1.2.3a1,
          # v1.2.3b2, v1.2.3.dev1, v1.2.3-rc1) is treated as a prerelease -> TestPyPI.
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Verify tag matches package version
        shell: bash
        run: |
          PKG=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG="${GITHUB_REF_NAME#v}"
          # Compare normalized core version (strip prerelease suffix from the tag).
          if [[ "${TAG%%[abr-]*}" != "${PKG%%[abr-]*}" ]]; then
            echo "::error::tag ${TAG} does not match pyproject version ${PKG}"; exit 1
          fi
      - name: Build
        env:
          SOURCE_DATE_EPOCH: "1700000000"
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  testpypi:
    name: Publish to TestPyPI (prerelease)
    needs: build
    if: needs.build.outputs.prerelease == 'true'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/tokenhelm
    permissions:
      id-token: write # OIDC — Trusted Publishing, no API token needed
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  pypi:
    name: Publish to PyPI (final)
    needs: build
    if: needs.build.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/tokenhelm
    permissions:
      id-token: write # OIDC — Trusted Publishing, no API token needed
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: GitHub Release
    needs: [build, testpypi, pypi]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release and attach artifacts
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ needs.build.outputs.prerelease == 'true' }}
