name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade ruff
      - run: ruff check src tests
      - run: ruff format --check src tests

  test:
    name: Test (py${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Run tests (with coverage gate)
        run: pytest --cov=tokenhelm --cov-report=term-missing --cov-fail-under=90
      - name: Run benchmarks
        run: pytest -m benchmark -q

  build:
    name: Build & verify distribution
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        env:
          SOURCE_DATE_EPOCH: "1700000000" # deterministic timestamps for reproducible builds
        run: |
          python -m pip install --upgrade build twine
          python -m build
      - name: Check metadata
        run: twine check dist/*
      - name: Verify clean install + import
        run: |
          python -m venv /tmp/fresh
          /tmp/fresh/bin/python -m pip install dist/*.whl
          /tmp/fresh/bin/python -c "import tokenhelm; from tokenhelm.adapters import default_adapters; assert [a.provider.value for a in default_adapters()] == ['openai','anthropic','gemini','ollama']; print('OK', tokenhelm.__version__)"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  security:
    name: Security audit
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Dependency vulnerability audit
        run: |
          python -m pip install --upgrade pip-audit
          python -m pip install -e .
          pip-audit --strict --desc      # audits the installed environment (runtime deps)
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
